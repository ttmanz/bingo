<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bingo 90</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
  <script type="importmap">
  {
    "imports": {
      "gsap":           "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm",
      "canvas-confetti":"https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.module.mjs",
      "cannon-es":      "https://esm.sh/cannon-es@0.20.0"
    }
  }
  </script>
</head>
<body>
  <div class="stars"></div>

  <div class="app">
    <h1 class="title">
      <span class="b">B</span><span class="i">I</span><span class="n">N</span><span class="g">G</span><span class="o">O</span>
    </h1>

    <!-- Draw stage: lottery machine (left) + call ball (right, on table) -->
    <div class="draw-stage">

      <!-- LEFT: lottery machine (acrylic drum + S-curve tube) -->
      <div class="lottery-machine" id="lottery-machine">

        <!-- SVG tube system — clear acrylic look -->
        <svg class="tube-svg" viewBox="0 0 580 460" xmlns="http://www.w3.org/2000/svg" overflow="visible">
          <defs>
            <filter id="tube-glow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="tube-soft" x="-10%" y="-10%" width="120%" height="120%">
              <feGaussianBlur stdDeviation="1.5"/>
            </filter>
          </defs>

          <!-- White rim — ~1.5px each side -->
          <!-- Tubes B, D, F slant 2°: B right-end drops to y=25; D left-end drops to y=140; F right-end drops to y=260 -->
          <path d="M155,100 L155,12 L530,25 L530,135 L375,140 L375,255 L530,260 L530,385 L120,385"
            fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="36"
            stroke-linecap="round" stroke-linejoin="round"/>

          <!-- Dark interior — leaves 1.5px white rim visible -->
          <path d="M155,100 L155,12 L530,25 L530,135 L375,140 L375,255 L530,260 L530,385 L120,385"
            fill="none" stroke="rgba(3,13,30,0.45)" stroke-width="33"
            stroke-linecap="round" stroke-linejoin="round"/>

          <!-- Funnel — trapezoid cone, open top (no top edge drawn) -->
          <path d="M137,100 L112,124 L198,124 L173,100"
            fill="rgba(3,13,30,0.45)"
            stroke="rgba(255,255,255,0.55)"
            stroke-width="1.5"
            stroke-linejoin="miter"
            stroke-linecap="square"/>

          <!-- Exit collar at drum top — purple LED ring -->
          <rect x="139" y="87" width="32" height="26" rx="7"
            fill="rgba(160,60,240,0.35)" stroke="rgba(230,160,255,0.90)" stroke-width="2"/>
          <rect x="143" y="91" width="24" height="18" rx="4"
            fill="rgba(20,5,50,0.70)" stroke="rgba(200,140,255,0.40)" stroke-width="1"/>
        </svg>

        <!-- Drum sphere -->
        <div class="drum-wrapper">
          <div class="drum-sphere" id="drum">
            <div class="drum-highlight-top"></div>
            <div class="drum-highlight-bottom"></div>
            <div class="drum-baffles"></div>
            <div class="drum-inner-tube">
              <div class="drum-inner-tube-cap top"></div>
              <div class="drum-inner-tube-cap bottom"></div>
            </div>
            <div class="drum-cage-overlay"></div>
            <!-- 90 balls injected by DrumPhysics -->
          </div>
          <div class="drum-collar"></div>
          <div class="drum-stand"></div>
          <div class="drum-base-glow"></div>
          <div class="drum-base-platform"></div>
        </div>

      <!-- Current ball — positioned between the two bottom horizontal tube segments -->
      <div id="current-ball" class="current-ball">
        <div class="ball-number">--</div>
      </div>

      </div><!-- end .lottery-machine -->

      <!-- hidden JS elements kept for compatibility -->
      <div class="call-panel" style="display:none">
        <div class="call-label">Last Called</div>
        <div class="call-sublabel" id="call-sublabel">&nbsp;</div>
        <div class="drum-timer-bar" id="drum-timer-bar"></div>
        <div class="drum-status" id="drum-status">
          <span id="drum-status-text"></span><span id="drum-countdown"></span><span id="drum-status-suffix"></span>
        </div>
      </div>

    </div><!-- end .draw-stage -->

    <!-- Called number history -->
    <div id="called-numbers" class="called-numbers"></div>

    <!-- 90-ball bingo card -->
    <div id="card-container"></div>
    <button id="new-card-btn" class="new-card-btn">New Card</button>
  </div>

  <div id="win-overlay" class="win-overlay">
    <div class="win-text">BINGO!</div>
    <button id="play-again-btn" class="play-again-btn">Play Again</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
